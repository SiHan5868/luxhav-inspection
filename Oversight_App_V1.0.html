.cover .brand svg,.cover .brand span{display:none}
.cv-mid{margin:auto 0;display:flex;flex-direction:column;align-items:center}
.cv-ey{font-size:8pt;letter-spacing:5px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:18pt}
.cv-mem{font-size:11pt;letter-spacing:4px;text-transform:uppercase;color:#F3ECDE}
.cv-sub{font-size:7.5pt;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.42);margin-top:5pt}
.cv-res{font-family:var(--serif);font-weight:300;font-size:40pt;line-height:1.03;color:#fff;margin:16pt 0 0}
.cv-rule{width:52pt;height:.5pt;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20pt auto 16pt}
.cv-prep{font-size:10.5pt;color:rgba(255,255,255,.6);line-height:2}
.cv-conf{margin-top:30pt;padding-top:14pt;position:relative;font-size:6.5pt;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.42);line-height:2.4}
.cv-conf::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:30pt;height:.5pt;background:rgba(184,151,106,.5)}

/* \u2500\u2500 I \xB7 EXECUTIVE ASSESSMENT \u2500\u2500 */
.cond-panel{background:var(--card);border:.75pt solid var(--line);border-radius:2pt;padding:22pt;text-align:center;margin-bottom:22pt;position:relative;break-inside:avoid}
.cond-panel::before,.cond-panel::after{content:'';position:absolute;left:22pt;right:22pt;height:.5pt;background:var(--line-soft)}
.cond-panel::before{top:12pt}.cond-panel::after{bottom:12pt}
.cond-panel .l{font-size:7.5pt;letter-spacing:3px;text-transform:uppercase;color:var(--gold-soft)}
.cond-panel .v{font-family:var(--serif);font-weight:300;font-size:28pt;color:var(--tone,var(--head));margin-top:6pt}
.block{margin-bottom:18pt;break-inside:avoid}
.block .bh{font-size:8pt;letter-spacing:3px;text-transform:uppercase;color:var(--gold-deep);margin-bottom:7pt;display:flex;align-items:center;gap:9pt}
.block .bh::after{content:'';flex:1;height:.5pt;background:var(--line-soft)}
.block p{font-size:10.5pt;line-height:1.8;color:var(--text)}
.block p + p{margin-top:8pt}
.as-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:.75pt;margin-top:22pt;background:var(--line);border:.75pt solid var(--line);break-inside:avoid}
.as-meta > div{text-align:center;padding:14pt 8pt;background:#0D0D0B}
.as-meta .l{font-size:7pt;letter-spacing:2px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:5pt}
.as-meta .v{font-family:var(--serif);font-size:11.5pt;color:var(--head)}

/* \u2500\u2500 II \xB7 RESIDENCE DETAILS \u2500\u2500 */
.facts{display:grid;grid-template-columns:1fr 1fr;column-gap:32pt}
.fact{display:flex;justify-content:space-between;gap:14pt;align-items:baseline;padding:8.5pt 0;border-bottom:.5pt solid var(--line-soft);break-inside:avoid}
.fact .k{font-size:8pt;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.fact .v{font-family:var(--serif);font-size:12pt;color:var(--head);text-align:right;word-break:break-word}

/* \u2500\u2500 III \xB7 ASSESSMENT RESULTS \u2500\u2500 */
.confirm-list{border-top:.5pt solid var(--line-soft)}
.confirm{display:flex;gap:13pt;align-items:center;padding:11pt 0;border-bottom:.5pt solid var(--line-soft);break-inside:avoid}
.confirm .ck{flex:none;width:15pt;height:15pt;border:.75pt solid rgba(184,151,106,.5);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--gold);font-size:8pt;background:rgba(184,151,106,.09)}
.confirm .ct{font-family:var(--serif);font-weight:300;font-size:12.5pt;line-height:1.45;color:var(--head)}

/* \u2500\u2500 IV \xB7 FINDINGS \u2500\u2500 */
.fgroup{margin-bottom:16pt}
.fdom{font-family:var(--serif);font-weight:300;font-size:16pt;color:var(--head);margin-bottom:10pt;padding-bottom:6pt;border-bottom:.5pt solid var(--line);break-after:avoid}
.finding{background:var(--card);border:.75pt solid var(--line);border-radius:2pt;padding:15pt 16pt;margin-bottom:10pt;break-inside:avoid}
.f-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11pt;padding-bottom:10pt;border-bottom:.5pt solid var(--line-soft)}
.f-tag{font-size:7pt;letter-spacing:2.5px;text-transform:uppercase;padding:3.5pt 10pt;border-radius:1.5pt;color:#fff;background:var(--amber)}
.finding.is-action .f-tag{background:var(--action)}
.f-ref{font-size:7.5pt;letter-spacing:2px;text-transform:uppercase;color:var(--gold-soft)}
.f-h{font-family:var(--serif);font-weight:400;font-size:14pt;line-height:1.3;color:var(--head);margin-bottom:7pt}
.f-note{font-size:10.5pt;line-height:1.7;color:var(--text)}
.f-rec{margin-top:11pt;padding:11pt 13pt;background:rgba(184,151,106,.07);border:.5pt solid var(--line);border-left:1.5pt solid var(--gold);border-radius:2pt}
.f-rec .rl{font-size:6.5pt;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:4pt}
.f-rec p{font-family:var(--serif);font-style:italic;font-size:11pt;line-height:1.55;color:var(--gold-pale)}
.f-photos{display:grid;gap:7pt;margin-top:12pt;grid-template-columns:repeat(auto-fit,minmax(130pt,1fr))}
.f-photos img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:2pt;border:.5pt solid var(--line)}
.f-clean{text-align:center;padding:20pt 0}
.f-clean .ck{font-size:22pt;color:var(--gold);margin-bottom:10pt}
.f-clean h3{font-family:var(--serif);font-weight:300;font-size:19pt;color:var(--head);margin-bottom:8pt}
.f-clean p{max-width:120mm;margin:0 auto;color:var(--muted);font-size:10pt;line-height:1.6}
.f-close-line{margin-top:18pt;padding-top:12pt;border-top:.5pt solid var(--line-soft);text-align:center;font-family:var(--serif);font-style:italic;font-size:11pt;color:var(--muted)}

/* \u2500\u2500 V \xB7 PRIORITY ACTIONS \u2500\u2500 */
.pa-list{display:flex;flex-direction:column;gap:10pt}
.pa-item{display:flex;gap:14pt;background:var(--card);border:.75pt solid var(--line);border-left:1.5pt solid var(--gold);border-radius:2pt;padding:14pt 16pt;break-inside:avoid}
.pa-item .pa-ref{flex:none;min-width:44pt;font-family:var(--serif);font-style:italic;font-size:12pt;color:var(--gold-soft)}
.pa-body{flex:1;min-width:0}
.pa-dom{font-size:7pt;letter-spacing:2px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:6pt}
.pa-txt{font-family:var(--serif);font-weight:300;font-size:12.5pt;line-height:1.5;color:var(--head)}
.pa-rec{margin-top:9pt;padding-top:9pt;border-top:.5pt solid var(--line-soft);font-size:10pt;line-height:1.55;color:var(--text)}
.block-note{margin-top:16pt;padding:14pt 16pt;background:rgba(184,151,106,.07);border:.75pt solid var(--line);border-left:1.5pt solid var(--gold);border-radius:2pt;break-inside:avoid}
.block-note .bh{color:var(--gold-soft)}
.block-note .bh::after{display:none}
.block-note p{font-family:var(--serif);font-style:italic;font-size:11pt;line-height:1.6;color:var(--gold-pale)}

/* \u2500\u2500 VI \xB7 DIRECTOR'S NOTES \u2500\u2500 */
.sec-notes .block{background:var(--card);border:.75pt solid var(--line);border-radius:2pt;padding:14pt 16pt;margin-bottom:10pt}

/* \u2500\u2500 CLOSING / MEMBERSHIP / SIGN-OFF \u2500\u2500 */
.sec-close{background:#0D0D0B;color:var(--text);position:relative;padding-top:15mm;background-image:radial-gradient(130% 50% at 50% 0%,rgba(184,151,106,.1),transparent 60%)}
.sec-close .sec-head .sec-n{color:var(--gold)}
.sec-close .sec-head .sec-t{color:var(--gold-soft)}
.mem-intro{font-family:var(--serif);font-weight:300;font-style:italic;font-size:14pt;line-height:1.72;color:var(--gold-pale);margin:6pt 0 18pt;max-width:150mm}
.prov{display:flex;gap:10pt;padding:8.5pt 0;border-top:.5pt solid var(--line-soft);break-inside:avoid}
.prov:first-of-type{border-top:none}
.prov .pd{font-size:10.5pt;color:var(--head)}
.prov .pd small{display:block;color:var(--muted);font-size:8.5pt;margin-top:2pt}
.prov .pa-dot{color:var(--gold);padding-top:2pt}
.sign{margin-top:22pt;text-align:center;padding-top:20pt;border-top:.5pt solid var(--line);break-inside:avoid}
.sign-ey{font-size:7pt;letter-spacing:3px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:14pt}
.sign .nm{font-family:var(--serif);font-style:italic;font-size:24pt;color:#fff;line-height:1}
.sign .sl{width:120pt;height:.5pt;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12pt auto}
.sign .rl{font-size:7.5pt;letter-spacing:3px;text-transform:uppercase;color:var(--gold-soft)}
.sign .en{font-family:var(--serif);font-style:italic;font-size:10pt;color:var(--muted);margin-top:9pt}
.sign .decl{max-width:140mm;margin:20pt auto 0;font-size:9pt;line-height:1.85;color:var(--text)}
.sign .decl .dl{display:block;font-size:6.5pt;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:7pt}
.audit{display:flex;flex-wrap:wrap;justify-content:center;gap:8pt 22pt;max-width:150mm;margin:18pt auto 0;padding-top:13pt;border-top:.5pt solid var(--line-soft);font-size:9pt;color:var(--text)}
.audit b{color:var(--gold-soft);font-weight:400;letter-spacing:1.5px;text-transform:uppercase;font-size:6.5pt;margin-right:5pt}
.foot{margin-top:16pt;padding-top:10pt;border-top:.5pt solid var(--line-soft);display:flex;justify-content:space-between;font-size:6.5pt;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}
.dl-pill{display:none}
`;

  // src/report/report-sections.js
  var brand = () => `<span class="brand">${MARK_GOLD}<span>LUXHAV<sup>PRIV\xC9</sup></span></span>`;
  var para = (t) => esc(t).split(/\n{2,}/).map((s) => `<p>${s.replace(/\n/g, "<br>")}</p>`).join("");
  var block = (h, t) => t && String(t).trim() ? `<div class="block"><div class="bh">${esc(h)}</div>${para(t.trim())}</div>` : "";
  var head = (n, t) => `<div class="sec-head"><span class="sec-n">${n}</span><span class="sec-t">${esc(t)}</span></div>`;
  function cover(M) {
    return `<header class="cover">
    ${brand()}
    <div class="cv-mid">
      <div class="cv-ey">Private Residence Oversight</div>
      <div class="cv-mem">${esc(M.meta.membership)} Membership</div>
      <div class="cv-sub">${esc(M.cadenceLabel)} \xB7 Visit No. ${esc(M.meta.visitNo)}</div>
      <h1 class="cv-res">${esc(M.residenceName)}</h1>
      <div class="cv-rule"></div>
      <div class="cv-prep">Prepared for ${esc(M.meta.client)}<br>Reference ${esc(M.reference)} \xB7 ${esc(M.dateLong)}</div>
    </div>
    <div class="cv-conf">Private &amp; Confidential<br>Discretion \xB7 Precision \xB7 Presence</div>
  </header>`;
  }
  function executive(M) {
    const exec = (M.review.executiveSummary || "").trim();
    return `<section class="sec sec-exec cond-${M.condTone}">
    ${head("II", "Oversight Director Assessment")}
    <div class="cond-panel"><div class="l">Overall Residence Condition</div><div class="v">${esc(M.overallCondition || "\u2014")}</div></div>
    ${exec ? `<div class="block"><div class="bh">Executive Summary</div>${para(exec)}</div>` : ""}
    <div class="as-meta">
      <div><div class="l">Reviewed</div><div class="v">${esc(M.dateLong)}</div></div>
      <div><div class="l">Attended by</div><div class="v">${esc(M.signoff.name)}</div></div>
      <div><div class="l">Next review</div><div class="v">${esc(M.nextReview.date)}</div></div>
    </div>
  </section>`;
  }
  function details(M) {
    const facts = [
      ["Residence", M.meta.residence],
      ["Primary Contact", M.meta.client],
      ["Membership", M.meta.membership],
      ["Visit", M.meta.visitNo ? `No. ${M.meta.visitNo}` : ""],
      ["Inspection Date", M.dateLong],
      ["Duration on Site", M.durationLabel && M.durationLabel !== "\u2014" ? M.durationLabel : ""],
      ["Next Scheduled Review", M.nextReview && M.nextReview.date ? M.nextReview.date : ""],
      ...M.propertyDetails
    ].filter(([, v]) => v !== "" && v != null);
    return `<section class="sec sec-details">
    ${head("I", "Residence Details")}
    <h2 class="title">Residence <em>Details</em></h2>
    <div class="facts">${facts.map(([k, v]) => `<div class="fact"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join("")}</div>
  </section>`;
  }
  function confirmations(M) {
    const items = (M.confirmations || []).map((c) => `<div class="confirm"><span class="ck">\u2713</span><span class="ct">${esc(c)}</span></div>`).join("");
    return `<section class="sec sec-confirm">
    ${head("III", "Assessment Results")}
    <h2 class="title">What We <em>Confirmed</em></h2>
    <div class="confirm-list">${items}</div>
  </section>`;
  }
  function findingCard(e) {
    const photos = (e.photos || []).slice(0, 3);
    const act = e.priority === "action";
    const heading = e.checkpointLabel || e.title || "Observation";
    return `<article class="finding ${act ? "is-action" : "is-advisory"}">
    <div class="f-top"><span class="f-tag">${act ? "Action" : "Advisory"}</span><span class="f-ref">REF ${esc(e.ref)}</span></div>
    <div class="f-h">${esc(heading)}</div>
    <div class="f-note">${esc(e.note || "")}</div>
    ${e.recommendation ? `<div class="f-rec"><div class="rl">Recommended Next Step</div><p>${esc(e.recommendation)}</p></div>` : ""}
    ${photos.length ? `<div class="f-photos">${photos.map((p) => `<img src="${p}" alt="Observation photograph">`).join("")}</div>` : ""}
  </article>`;
  }
  function findings(M) {
    let inner;
    if (!M.hasExceptions) {
      inner = `<div class="f-clean">
      <div class="ck">\u2713</div>
      <h3>No observations<br>were necessary</h3>
      <p>Following a complete review across all assessment domains, your residence required no attention. Everything remains exactly as it should be.</p>
    </div>`;
    } else {
      inner = M.findingsByDomain.map(
        (g) => `<div class="fgroup"><div class="fdom">${esc(g.name)}</div>${g.items.map(findingCard).join("")}</div>`
      ).join("") + `<div class="f-close-line">Everything else was confirmed in good order.</div>`;
    }
    return `<section class="sec sec-findings">
    ${head("IV", "Findings")}
    ${M.hasExceptions ? '<h2 class="title">Findings &amp; <em>Observations</em></h2>' : ""}
    ${inner}
  </section>`;
  }
  function priorityActions(M) {
    const note = (M.review.priorityActionsNote || "").trim();
    const list = M.priorityActions.length ? `<div class="pa-list">${M.priorityActions.map((e) => `
        <div class="pa-item">
          <span class="pa-ref">REF ${esc(e.ref)}</span>
          <div class="pa-body">
            <div class="pa-dom">${esc(e.domain)}${e.checkpointLabel ? ` \xB7 ${esc(e.checkpointLabel)}` : ""}</div>
            <div class="pa-txt">${esc(e.note || "")}</div>
            ${e.recommendation ? `<div class="pa-rec">${esc(e.recommendation)}</div>` : ""}
          </div>
        </div>`).join("")}</div>` : `<div class="f-clean" style="padding:26px 0"><div class="ck">\u2713</div><h3 style="font-size:1.6rem">No priority actions</h3><p>No findings requiring action were recorded during this review.</p></div>`;
    return `<section class="sec sec-actions">
    ${head("V", "Priority Actions")}
    <h2 class="title">Priority <em>Actions</em></h2>
    ${list}
    ${note ? `<div class="block block-note"><div class="bh">Director's Commentary</div>${para(note)}</div>` : ""}
  </section>`;
  }
  function directorNotes(M) {
    const g = block("General Observations", M.review.generalObservations);
    const c = block("Additional Director Comments", M.review.directorComments);
    if (!g && !c) return "";
    return `<section class="sec sec-notes">
    ${head("VI", "Director\u2019s Notes")}
    <h2 class="title">Director's <em>Notes</em></h2>
    ${g}${c}
  </section>`;
  }
  function closing(M) {
    const provs = (M.membershipProvisions || []).slice(0, 5).map(([t, s]) => `<div class="prov"><span class="pa-dot">&#10022;</span><div class="pd">${esc(t)}<small>${esc(s)}</small></div></div>`).join("");
    const a = M.audit || {};
    const membership = (M.meta.membership || "").trim();
    const article = /^[aeiou]/i.test(membership) ? "an" : "a";
    const memberLine = membership ? `As ${article} ${esc(membership)} member, your home remains continually held within Luxhav's care.` : `Your home remains continually held within Luxhav's care.`;
    return `<section class="sec sec-close">
    ${head("\u2726", "Your Membership Continues")}
    <div class="mem-intro">Our oversight of your residence does not pause between visits. ${memberLine}</div>
    ${provs}
    <div class="sign">
      <div class="sign-ey">Oversight Director Sign-off</div>
      <div class="nm">${esc(M.signoff.name)}</div>
      <div class="sl"></div>
      <div class="rl">${esc(M.signoff.role)} \xB7 Luxhav Priv\xE9</div>
      <div class="en">${esc(M.signoff.endorsement)}</div>
      <div class="decl"><span class="dl">Oversight Declaration</span>This Residence Oversight Review was attended in person on the owner's behalf, in accordance with the Luxhav Priv\xE9 oversight protocol. The residence was reviewed across all assessment domains and the Oversight Director's overall assessment recorded above. This briefing is held confidentially as part of your residence's permanent record.</div>
      <div class="audit">
        <span><b>Reference</b> ${esc(a.reference || M.reference || "\u2014")}</span>
        <span><b>Start</b> ${esc(a.start || "\u2014")}</span>
        <span><b>Finish</b> ${esc(a.finish || "\u2014")}</span>
        ${a.duration ? `<span><b>Duration</b> ${esc(a.duration)}</span>` : ""}
      </div>
    </div>
    <div class="foot"><span>Luxhav Priv\xE9</span><span>Private &amp; Confidential \xB7 ${esc(M.reference)}</span></div>
  </section>`;
  }
  function reportBody(M) {
    return `<div class="wrap">
    ${cover(M)}
    ${details(M)}
    ${executive(M)}
    ${confirmations(M)}
    ${findings(M)}
    ${priorityActions(M)}
    ${directorNotes(M)}
    ${closing(M)}
  </div>`;
  }

  // src/report/html-report.js
  var FONTS = `<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">`;
  function renderHtmlReport(M) {
    return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141210">
<title>Luxhav Oversight Report \xB7 ${esc(M.residenceName)} \xB7 ${esc(M.reference)}</title>
${FONTS}
<style>${REPORT_CSS}</style>
</head><body>
${reportBody(M)}
</body></html>`;
  }

  // src/report/pdf-report.js
  var FONTS2 = `<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">`;
  function renderPdfReport(M, opts = {}) {
    const autoPrint = opts.autoPrint !== false;
    const trigger = autoPrint ? `<script>window.addEventListener('load',function(){setTimeout(function(){window.focus();window.print();},600);});<\/script>` : "";
    return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Luxhav Oversight Report \xB7 ${esc(M.residenceName)} \xB7 ${esc(M.reference)}</title>
${FONTS2}
<style>${PDF_CSS}</style>
</head><body>
${reportBody(M)}
${trigger}
</body></html>`;
  }

  // src/ui/app.js
  var app = {
    V: newVisit(),
    step: 0,
    maxStep: 0,
    // furthest section reached (gates header navigation)
    ui: { form: null },
    // DOM helpers
    $(sel) {
      return document.querySelector(sel);
    },
    $$(sel) {
      return Array.from(document.querySelectorAll(sel));
    },
    mountScreen(html, opts = {}) {
      const withBar = opts.dataBar !== false;
      document.getElementById("screen").innerHTML = html + (withBar ? dataBar({ exportBtn: true, importBtn: true }) : "");
      if (withBar) this.wireDataBar();
    },
    wireDataBar() {
      const ex = document.getElementById("ioExport");
      if (ex) ex.onclick = () => this.exportReview();
      const im = document.getElementById("ioImport");
      if (im) im.onchange = () => {
        const f = im.files[0];
        im.value = "";
        this.importReview(f);
      };
    },
    mountBar(html) {
      document.getElementById("bar").innerHTML = html;
    },
    setHdr(html) {
      const el = document.getElementById("hdrCtx");
      if (el) el.innerHTML = html;
    },
    toast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(t._h);
      t._h = setTimeout(() => t.classList.remove("show"), 2600);
    },
    NAV: [
      { l: "Review Details", s: 0 },
      { l: "Security", s: 1 },
      { l: "External", s: 2 },
      { l: "Vehicles", s: 3 },
      { l: "Systems", s: 4 },
      { l: "Interior", s: 5 },
      { l: "Household", s: 6 },
      { l: "Review", s: 7 },
      { l: "Assessment", s: 8 }
    ],
    renderNav() {
      const el = document.getElementById("navbar");
      if (!el) return;
      el.innerHTML = this.NAV.map((n) => {
        const cur2 = n.s === this.step;
        const locked = n.s > this.maxStep;
        const cls = cur2 ? "cur" : locked ? "locked" : "done";
        return `<button class="nv ${cls}" data-nav="${n.s}" ${locked ? 'disabled aria-disabled="true"' : ""}>${n.l}</button>`;
      }).join("");
      el.querySelectorAll("[data-nav]").forEach((b) => b.onclick = () => {
        const s = parseInt(b.dataset.nav, 10);
        if (s <= this.maxStep) {
          this.ui.form = null;
          this.go(s);
        }
      });
      const cur = el.querySelector(".nv.cur");
      if (cur && cur.scrollIntoView) cur.scrollIntoView({ inline: "center", block: "nearest" });
    },
    render() {
      this.renderNav();
      const s = this.screens;
      if (this.step === 0) return s.renderSetup();
      if (this.step >= 1 && this.step <= 6) return s.renderDomain(this.step - 1);
      if (this.step === 7) return s.renderReview();
      if (this.step === 8) return s.renderVerdict();
    },
    go(step) {
      this.step = step;
      this.maxStep = Math.max(this.maxStep, step);
      this.save();
      this.render();
      const sc = document.getElementById("screen");
      if (sc) sc.scrollTop = 0;
    },
    save() {
      const ok = store.save({ V: this.V, step: this.step, maxStep: this.maxStep });
      if (ok) {
        const t = document.getElementById("draftTag");
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1100);
      }
    },
    resetAll() {
      this.V = newVisit();
      this.step = 0;
      this.maxStep = 0;
      this.ui = { form: null };
      store.clear();
      this.render();
    },
    startNewVisit() {
      if (hasData(this.V)) {
        this.showModal({
          title: "Start a new review?",
          message: "This will clear the current review. Any unsaved changes will be lost.",
          actions: [
            { label: "Cancel" },
            { label: "Start New Review", primary: true, onClick: () => {
              this.resetAll();
              this.toast("New review started.");
            } }
          ]
        });
      } else {
        this.resetAll();
      }
    },
    /* ── modal ── */
    showModal({ title, message, actions }) {
      const ov = document.createElement("div");
      ov.className = "modal-ov";
      ov.innerHTML = `<div class="modal"><div class="m-title">${title}</div><div class="m-msg">${message}</div><div class="m-actions"></div></div>`;
      const wrap = ov.querySelector(".m-actions");
      actions.forEach((a) => {
        const b = document.createElement("button");
        b.className = "btn " + (a.primary ? "gold" : "ghost");
        b.textContent = a.label;
        b.onclick = () => {
          if (ov.parentNode) document.body.removeChild(ov);
          if (a.onClick) a.onClick();
        };
        wrap.appendChild(b);
      });
      document.body.appendChild(ov);
    },
    /* ── JSON export / import (same architecture as Comprehensive app) ── */
    exportReview() {
      try {
        const blob = new Blob([JSON.stringify(this.V, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const ref = (this.V.meta.reference || "review").replace(/[^\w.-]+/g, "_");
        const date = this.V.meta.date || (/* @__PURE__ */ new Date()).toISOString().slice(0, 10);
        a.href = url;
        a.download = `Luxhav_${ref}_${date}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1e3);
        this.toast("Review exported.");
      } catch (e) {
        this.toast("Export failed.");
      }
    },
    importReview(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const obj = JSON.parse(e.target.result);
          if (!obj || !obj.meta || !Array.isArray(obj.domains)) {
            this.toast("Import failed \u2014 invalid file.");
            return;
          }
          this.V = obj;
          this.step = 0;
          this.maxStep = 8;
          this.ui = { form: null };
          store.save({ V: this.V, step: this.step, maxStep: this.maxStep });
          this.render();
          const sc = document.getElementById("screen");
          if (sc) sc.scrollTop = 0;
          this.toast("Review imported successfully. You may now review and edit any section before generating the client deliverables.");
        } catch (err) {
          this.toast("Import failed \u2014 could not read file.");
        }
      };
      reader.readAsText(file);
    },
    // ── Stage 2: deliver the HTML client briefing ──
    generateBriefing() {
      try {
        const model = buildReportModel(this.V);
        const html = renderHtmlReport(model);
        const blob = new Blob([html], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Luxhav_${model.reference}.html`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        this.toast("HTML report downloaded.");
        setTimeout(() => URL.revokeObjectURL(url), 6e4);
      } catch (e) {
        console.error(e);
        this.toast("Could not generate the briefing.");
      }
    },
    // ── Standalone PDF deliverable — its own Assessment-page action ──
    // Generated from the same briefing renderer in print-ready ('pdf') mode.
    // (Dedicated branded PDF generator is scaffolded here for the next pass.)
    generatePdf() {
      try {
        const model = buildReportModel(this.V);
        const html = renderPdfReport(model, { autoPrint: false });
        const prev = document.getElementById("pdfFrame");
        if (prev) prev.remove();
        const iframe = document.createElement("iframe");
        iframe.id = "pdfFrame";
        iframe.setAttribute("aria-hidden", "true");
        iframe.style.cssText = "position:fixed;left:-9999px;top:0;width:0;height:0;border:0;visibility:hidden";
        document.body.appendChild(iframe);
        const idoc = iframe.contentWindow.document;
        idoc.open();
        idoc.write(html);
        idoc.close();
        try {
          idoc.title = `Luxhav_${model.reference}`;
        } catch (e) {
        }
        const fire = () => {
          try {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
          } catch (e) {
            console.error(e);
          }
          setTimeout(() => {
            try {
              iframe.remove();
            } catch (e) {
            }
          }, 3e3);
        };
        setTimeout(fire, 800);
        this.toast("Preparing your PDF\u2026");
      } catch (e) {
        console.error(e);
        this.toast("Could not generate the PDF.");
      }
    },
    boot() {
      this.screens = createScreens(this);
      const brand2 = document.getElementById("brand");
      if (brand2) brand2.innerHTML = OFFICIAL_LOGO;
      const nb = document.getElementById("newVisitBtn");
      if (nb) nb.onclick = () => this.startNewVisit();
      const saved = store.load();
      this.V = newVisit();
      this.step = 0;
      this.maxStep = 0;
      this.ui = { form: null };
      this.render();
      if (saved && saved.V && hasData(saved.V)) {
        this.showModal({
          title: "Unfinished review found",
          message: "A previous review was saved on this device. Resume it, or start a new review?",
          actions: [
            { label: "Start New Review", onClick: () => {
              store.clear();
            } },
            { label: "Resume Previous Review", primary: true, onClick: () => {
              this.V = saved.V;
              this.step = saved.step || 0;
              this.maxStep = saved.maxStep != null ? saved.maxStep : saved.step || 0;
              this.render();
              const sc = document.getElementById("screen");
              if (sc) sc.scrollTop = 0;
            } }
          ]
        });
      }
    }
  };
  document.addEventListener("DOMContentLoaded", () => app.boot());
  window.LuxhavOversight = app;
})();
</script>
</body>
</html>
