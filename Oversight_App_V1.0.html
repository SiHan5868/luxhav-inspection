<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Luxhav Oversight App">
<title>Luxhav Oversight App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>/* styles/app.css — Residence Director field-application UI.
   Inherits the Luxhav dark system. Mobile-first; widens for iPad. */
:root{
  --dark:#0D0D0B; --surface:#111110; --surface-2:#16150F; --char:#14130F;
  --gold:#B8976A; --gold-light:#D4B48A; --gold-deep:#9A7A41;
  --cream:#FAF8F4; --line:rgba(184,151,106,0.16); --line-soft:rgba(184,151,106,0.08);
  --w-80:rgba(255,255,255,0.8); --w-60:rgba(255,255,255,0.6); --w-40:rgba(255,255,255,0.4); --w-25:rgba(255,255,255,0.25);
  --green:#86B98F; --green-deep:#4E7C57; --amber:#D08A3A; --amber-deep:#8A4010; --action:#B23A3A;
  --serif:'Cormorant Garamond',Georgia,serif; --sans:'Jost',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:#181716;color:var(--w-60);font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
svg{display:block}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* mobile-first column; widens for iPad */
.app{max-width:480px;margin:0 auto;height:100dvh;background:var(--dark);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 80px -20px rgba(0,0,0,.9)}
@media(min-width:560px){.app{margin:24px auto;height:calc(100dvh - 48px);border:1px solid var(--line);border-radius:18px}}
@media(min-width:740px){.app{max-width:720px}}
@media(min-width:1100px){.app{max-width:860px}}

.hdr{flex:none;display:flex;flex-direction:column;border-bottom:1px solid var(--line-soft);background:rgba(13,13,11,.98);z-index:20}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:15px 20px 11px}
.brand{display:flex;align-items:center}
.brand svg{height:30px;width:auto}
@media(min-width:740px){.brand svg{height:34px}}
.new-btn{background:transparent;border:1px solid var(--line);color:var(--gold);font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;padding:8px 13px;border-radius:3px;transition:.2s}
.new-btn:hover{border-color:var(--gold);background:rgba(184,151,106,.07)}

.navbar{display:flex;gap:3px;overflow-x:auto;padding:0 14px 11px;scrollbar-width:none;-ms-overflow-style:none}
.navbar::-webkit-scrollbar{display:none}
.nv{flex:none;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--w-40);
  font-size:.56rem;letter-spacing:.13em;text-transform:uppercase;padding:8px 11px;white-space:nowrap;transition:.18s;cursor:pointer}
.nv.done{color:rgba(184,151,106,.85)}
.nv.done:hover{color:var(--gold-light)}
.nv.cur{color:var(--gold-light);border-bottom-color:var(--gold)}
.nv.locked{color:var(--w-25);cursor:not-allowed}

.screen{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:26px 22px 40px;animation:fade .4s ease}
@media(min-width:740px){.screen{padding:34px 40px 44px}}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.eyebrow{font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(184,151,106,.78);margin-bottom:5px}
.s-title{font-family:var(--serif);font-weight:300;font-size:1.85rem;color:#fff;line-height:1.12;letter-spacing:-.005em}
.s-title em{font-style:italic;color:var(--gold-light)}
.s-sub{font-size:.78rem;color:var(--w-40);margin-top:8px;line-height:1.6}
.rule{height:1px;background:var(--line-soft);margin:22px 0}
.sec-label{font-size:.52rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(184,151,106,.8);margin:0 0 16px}

.welcome{text-align:center;padding-top:12px}
.welcome .brand-motif{display:inline-block;margin:0 auto 26px}
.welcome .brand-motif svg{height:52px;width:auto}
.welcome h1{font-family:var(--serif);font-weight:300;font-size:1.9rem;color:#fff;line-height:1.15}
.welcome .grule{width:34px;height:1px;background:var(--gold);opacity:.6;margin:12px auto 2px}
.welcome + .rule{margin-top:14px}

.field{margin-bottom:16px}
.field label{display:block;font-size:.5rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(184,151,106,.7);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;background:var(--surface);border:1px solid var(--line);color:#fff;font-size:.92rem;font-weight:300;padding:13px 15px;border-radius:4px;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);outline:none}
.field input.invalid{border-color:var(--action);background:rgba(178,58,58,.06)}
.field input.locked{opacity:.55;cursor:not-allowed}
.field textarea{resize:vertical;min-height:74px;line-height:1.5}
.field select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,rgba(184,151,106,.7) 50%),linear-gradient(135deg,rgba(184,151,106,.7) 50%,transparent 50%);background-position:calc(100% - 18px) 19px,calc(100% - 13px) 19px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
.field .hint{font-size:.62rem;color:var(--w-25);margin-top:5px;letter-spacing:.02em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
/* time/date: keep native picker but make the control permanently visible + clearly editable */
.field input[type="time"],.field input[type="date"]{cursor:pointer}
.field input[type="time"]::-webkit-calendar-picker-indicator,
.field input[type="date"]::-webkit-calendar-picker-indicator{
  opacity:1;cursor:pointer;width:17px;height:17px;margin-left:6px;border-radius:3px;
  filter:invert(72%) sepia(30%) saturate(560%) hue-rotate(357deg) brightness(92%) contrast(86%);
  transition:background .15s}
.field input[type="time"]:hover::-webkit-calendar-picker-indicator,
.field input[type="date"]:hover::-webkit-calendar-picker-indicator{background:rgba(184,151,106,.15)}
.field input[type="time"]::-webkit-datetime-edit,
.field input[type="date"]::-webkit-datetime-edit{color:#fff}
.field input[type="time"]:focus,.field input[type="date"]:focus{border-color:var(--gold)}

.dom-head{margin-bottom:18px}
.dom-head .s-title{font-family:var(--serif);font-weight:300;font-size:1.95rem;color:#fff;line-height:1.1}
.dom-head .s-sub{font-size:.72rem;letter-spacing:.06em;color:var(--w-40);margin-top:7px}
.dom-meta{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:22px}
.dom-meta .dnum{font-family:var(--serif);font-size:2.4rem;font-weight:300;color:rgba(184,151,106,.35);line-height:.8}
.status-line{display:inline-flex;align-items:center;gap:9px;border:1px solid;border-radius:6px;padding:9px 15px;margin-bottom:20px;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase}
.status-line .d{width:7px;height:7px;border-radius:50%}
.status-line .k{color:var(--w-40);font-weight:300}
.status-line .v{font-weight:500}
.status-line.complete{border-color:rgba(134,185,143,.4);background:rgba(134,185,143,.07)}
.status-line.complete .d{background:var(--green)}.status-line.complete .v{color:var(--green)}
.status-line.observation{border-color:rgba(208,138,58,.4);background:rgba(208,138,58,.07)}
.status-line.observation .d{background:var(--amber)}.status-line.observation .v{color:var(--amber)}
.status-line.action{border-color:rgba(178,58,58,.45);background:rgba(178,58,58,.08)}
.status-line.action .d{background:var(--action)}.status-line.action .v{color:#E98A8A}
/* checkpoint reference (linked observations) */
.cp-ref{border:1px solid var(--line);border-left:2px solid rgba(184,151,106,.55);border-radius:5px;padding:11px 14px;margin-bottom:13px;background:rgba(184,151,106,.05)}
.cp-ref .k{display:block;font-size:.5rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(184,151,106,.75);margin-bottom:5px}
.cp-ref .v{font-size:.95rem;color:var(--w-80);line-height:1.5}
.x-head{display:block}
.x-cp{display:block;font-size:.46rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(184,151,106,.7);margin-bottom:3px}
.x-cpq{font-size:.9rem;color:var(--w-80);line-height:1.45}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;padding:7px 13px;border:1px solid;border-radius:20px;white-space:nowrap;font-weight:400}
.pill .d{width:6px;height:6px;border-radius:50%}
.pill.confirmed{color:var(--green);border-color:rgba(134,185,143,.4);background:rgba(134,185,143,.07)}.pill.confirmed .d{background:var(--green)}
.pill.advisory{color:var(--amber);border-color:rgba(208,138,58,.4);background:rgba(208,138,58,.07)}.pill.advisory .d{background:var(--amber)}
.pill.action{color:#E98A8A;border-color:rgba(178,58,58,.45);background:rgba(178,58,58,.08)}.pill.action .d{background:var(--action)}

.readings{display:flex;gap:12px;margin-bottom:10px}
.reading{flex:1}
.reading label{display:block;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(184,151,106,.7);margin-bottom:7px}
.reading .ipt{display:flex;align-items:center;border:1px solid var(--line);border-radius:4px;background:var(--surface);overflow:hidden}
.reading .ipt input{flex:1;background:transparent;border:none;color:#fff;font-family:var(--serif);font-size:1.5rem;font-weight:300;padding:11px 0 11px 14px;width:100%}
.reading .ipt input:focus{outline:none}
.reading .ipt .unit{padding:0 14px;color:var(--gold-light);font-family:var(--serif);font-size:1.1rem}
.climate-msg{font-size:.66rem;color:var(--amber);margin-bottom:14px;min-height:0;opacity:0;transition:opacity .2s}
.climate-msg.show{opacity:1}

.ck-help{font-size:.66rem;color:var(--w-40);line-height:1.5;margin:18px 0 12px}
.ck-help b{color:var(--gold-light);font-weight:400}
.ck-list{margin-bottom:20px}
.ck{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:11px 12px;margin-bottom:8px;transition:.2s}
.ck.observed{border-color:rgba(208,138,58,.45);background:rgba(208,138,58,.05)}
.ck.na{opacity:.58}
.ck .lab{flex:1;line-height:1.35;font-size:.82rem;color:var(--w-80)}
.ck.na .lab{text-decoration:line-through;color:var(--w-40)}
.seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;flex:none}
.sg{min-width:44px;height:40px;background:transparent;border:none;border-left:1px solid var(--line);color:var(--w-40);font-size:.6rem;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;transition:.15s}
.sg:first-child{border-left:none}
.sg.c.on{color:var(--green);background:rgba(134,185,143,.14)}
.sg.n.on{color:var(--w-80);background:rgba(255,255,255,.07)}
.sg.obs.on{color:var(--amber);background:rgba(208,138,58,.16)}
.lab-wrap{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.lab-input{flex:1;min-width:0;background:transparent;border:none;border-bottom:1px solid rgba(184,151,106,.35);color:var(--w-80);font-size:.82rem;font-family:var(--sans);padding:3px 0}
.lab-input:focus{outline:none;border-bottom-color:var(--gold)}
.lab-input::placeholder{color:var(--w-25)}
.ck.added{border-style:dashed;border-color:rgba(184,151,106,.3)}
.ck-x{flex:none;width:24px;height:24px;border:none;background:transparent;color:var(--w-40);font-size:1.1rem;line-height:1;border-radius:4px;transition:.15s}
.ck-x:hover{color:#E98A8A;background:rgba(178,58,58,.1)}
.ck-finding{border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:0 4px 4px 0;background:rgba(255,255,255,.012);padding:12px 14px;margin:-2px 0 10px 12px}
.ck-finding.action{border-left-color:var(--action)}
.cf-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cf-badge{font-size:.46rem;letter-spacing:.16em;text-transform:uppercase;padding:3px 9px;color:#fff;background:#5a4a2f;border-radius:2px}
.cf-badge.action{background:#6e2b2b}
.cf-ref{font-size:.5rem;letter-spacing:.14em;color:var(--w-25)}
.cf-note{font-size:.8rem;color:var(--w-70);line-height:1.55}
.cf-rec{font-size:.75rem;color:var(--gold-light);font-style:italic;font-family:var(--serif);margin-top:6px;line-height:1.5}
.cf-thumbs{display:flex;gap:6px;margin-top:10px}
.cf-thumbs .x-thumb{width:54px;height:54px;object-fit:cover;border-radius:3px;border:1px solid var(--line)}
.cf-actions{display:flex;gap:14px;margin-top:11px}
.cf-actions button{background:none;border:none;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--w-40)}
.cf-actions .x-edit:hover{color:var(--gold)}.cf-actions .x-del:hover{color:#E98A8A}
.ck-panel{margin:-2px 0 12px 12px}

.exc-head{display:flex;align-items:center;justify-content:space-between;margin:24px 0 12px}
.exc-head .t{font-size:.5rem;letter-spacing:.24em;text-transform:uppercase;color:rgba(184,151,106,.7)}
.exc{border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:4px;background:rgba(255,255,255,.012);padding:14px 16px;margin-bottom:10px}
.exc.action{border-left-color:var(--action)}
.exc .x-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px}
.exc .x-title{font-family:var(--serif);font-size:1.05rem;color:#fff}
.exc .x-ref{font-size:.5rem;letter-spacing:.1em;color:rgba(184,151,106,.7)}
.exc .x-badge{display:inline-block;font-size:.46rem;letter-spacing:.16em;text-transform:uppercase;color:#fff;padding:2px 9px;background:var(--amber-deep);margin-bottom:8px}
.exc .x-badge.action{background:var(--action)}
.exc .x-note{font-size:.78rem;color:var(--w-60);line-height:1.5}
.exc .x-rec{font-size:.74rem;color:var(--gold-light);font-style:italic;font-family:var(--serif);margin-top:6px;line-height:1.5}
.exc .x-thumbs{display:flex;gap:6px;margin-top:10px}
.exc .x-thumb{width:54px;height:54px;object-fit:cover;border-radius:3px;border:1px solid var(--line)}
.exc .x-actions{display:flex;gap:16px;margin-top:11px}
.exc .x-edit,.exc .x-del{font-size:.5rem;letter-spacing:.16em;text-transform:uppercase;background:none;border:none;padding:0;text-decoration:underline;text-underline-offset:3px}
.exc .x-edit{color:var(--gold)}
.exc .x-del{color:var(--w-40)}

.exc-form{border:1px dashed rgba(184,151,106,.4);border-radius:6px;padding:16px;margin:4px 0 10px;background:rgba(184,151,106,.025)}
.exc-form .form-head{font-size:.5rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(184,151,106,.8);margin-bottom:12px}
.prio-pick{display:flex;gap:9px;margin:4px 0 12px}
.prio-pick button{flex:1;background:var(--surface);border:1px solid var(--line);color:var(--w-60);border-radius:4px;padding:11px;font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;transition:.2s}
.prio-pick button.sel.adv{border-color:var(--amber);color:var(--amber);background:rgba(208,138,58,.08)}
.prio-pick button.sel.act{border-color:var(--action);color:#E98A8A;background:rgba(178,58,58,.08)}
.photos{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.pthumb{position:relative;width:74px;height:74px}
.pthumb img{width:100%;height:100%;object-fit:cover;border-radius:4px;border:1px solid var(--line)}
.pthumb .pdel{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:#1a1812;border:1px solid var(--line);color:var(--cream);font-size:.8rem;line-height:1;display:flex;align-items:center;justify-content:center}
.photo-add{width:74px;height:74px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border:1px dashed rgba(184,151,106,.4);border-radius:4px;background:rgba(184,151,106,.03);color:rgba(184,151,106,.85);font-size:.5rem;letter-spacing:.12em;text-transform:uppercase}
.photo-add svg{width:18px;height:18px;stroke:var(--gold);fill:none;stroke-width:1.4}
.photo-hint{font-size:.6rem;color:var(--w-25);margin-top:9px;letter-spacing:.02em}
.form-actions{display:flex;gap:9px;margin-top:14px}

.add-link{display:flex;align-items:center;gap:8px;width:100%;justify-content:center;background:none;border:1px solid var(--line);border-radius:4px;padding:13px;color:var(--gold);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase}
.add-link:hover{border-color:var(--gold)}

.rev-row{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:14px 4px;border-bottom:1px solid var(--line-soft);background:none;border-left:none;border-right:none;border-top:none;transition:.15s}
button.rev-row{cursor:pointer}
button.rev-row:hover{background:rgba(184,151,106,.04)}
.rev-row.static{cursor:default}
.rev-row .ri{font-family:var(--serif);font-size:1.1rem;color:rgba(184,151,106,.6);min-width:20px}
.rev-row .rn{flex:1}
.rev-row .rn .nm{font-family:var(--serif);font-size:1.15rem;color:#fff;line-height:1.15}
.rev-row .rn .meta{font-size:.62rem;color:var(--w-60);font-weight:400;margin-top:3px;letter-spacing:.03em}
.rev-row .chev{color:rgba(184,151,106,.5);font-size:1.1rem}
.rev-status{display:inline-flex;align-items:center;gap:6px;font-size:.5rem;letter-spacing:.16em;text-transform:uppercase;padding:5px 11px;border-radius:3px;border:1px solid;white-space:nowrap}
.rev-status .d{width:6px;height:6px;border-radius:50%}
.rev-status.ok{color:var(--green);border-color:rgba(134,185,143,.4);background:rgba(134,185,143,.07)}
.rev-status.ok .d{background:var(--green)}
.rev-status.inc{color:var(--amber);border-color:rgba(208,138,58,.4);background:rgba(208,138,58,.07)}
.rev-status.inc .d{background:var(--amber)}
.rev-warn{margin-top:20px;text-align:center;font-size:.62rem;letter-spacing:.1em;color:var(--amber);opacity:.9}
/* Review summary strip */
.rv-strip{display:flex;gap:10px;margin:18px 0 4px}
.rv-stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:14px 10px;text-align:center}
.rv-stat .n{display:block;font-family:var(--serif);font-size:1.7rem;font-weight:300;color:#fff;line-height:1}
.rv-stat .n.adv{color:var(--amber)}
.rv-stat .n.act{color:#E98A8A}
.rv-stat .l{display:block;font-size:.48rem;letter-spacing:.16em;text-transform:uppercase;color:var(--w-40);margin-top:7px}
/* Key Findings / Issue Gallery */
.kf-grid{display:flex;flex-direction:column;gap:10px}
.kf-empty{font-size:.8rem;color:var(--w-40);font-style:italic;padding:14px 0 4px}
.kf-card{display:flex;align-items:stretch;gap:13px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:11px;transition:.15s;cursor:pointer}
.kf-card:hover{border-color:rgba(184,151,106,.5);background:rgba(184,151,106,.05)}
.kf-thumb{flex:none;width:52px;height:52px;border-radius:5px;background-size:cover;background-position:center;background-color:#000;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:rgba(184,151,106,.5);font-size:1rem}
.kf-thumb.none{color:rgba(184,151,106,.45)}
.kf-body{flex:1;min-width:0}
.kf-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.kf-dom{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(184,151,106,.8)}
.kf-ref{font-size:.48rem;letter-spacing:.1em;color:var(--w-25)}
.kf-sum{font-size:.82rem;color:var(--w-80);line-height:1.4;margin:4px 0 7px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.kf-sev{display:inline-block;font-size:.45rem;letter-spacing:.16em;text-transform:uppercase;padding:3px 9px;border-radius:2px}
.kf-sev.adv{color:#c9a24a;background:rgba(208,138,58,.12)}
.kf-sev.act{color:#E98A8A;background:rgba(178,58,58,.14)}
.kf-edit{flex:none;align-self:center;font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(184,151,106,.7)}

/* Residence Director Assessment */
.rda-field{margin-bottom:24px}
.rda-label{display:flex;align-items:center;gap:10px;font-size:.55rem;letter-spacing:.24em;text-transform:uppercase;color:rgba(184,151,106,.85);margin-bottom:8px}
.rda-label .req{font-size:.46rem;letter-spacing:.14em;color:var(--w-40);border:1px solid var(--line);border-radius:2px;padding:2px 6px}
.rda-help{font-size:.72rem;color:var(--w-40);line-height:1.5;margin:-2px 0 12px}
.rda-area{width:100%;min-height:84px;background:var(--surface);border:1px solid var(--line);border-radius:6px;color:var(--w-80);font-family:var(--sans);font-size:.86rem;line-height:1.6;padding:12px 13px;resize:vertical;transition:.15s}
.rda-area:focus{outline:none;border-color:var(--gold)}
.rda-area::placeholder{color:var(--w-25)}
.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cond-grid.invalid{outline:1px solid rgba(178,58,58,.5);outline-offset:4px;border-radius:6px}
.cond{background:var(--surface);border:1px solid var(--line);color:var(--w-60);border-radius:6px;padding:15px 12px;font-size:.7rem;letter-spacing:.06em;transition:.18s;text-align:center}
.cond:hover{border-color:rgba(184,151,106,.5)}
.cond.sel{border-color:var(--gold);color:var(--gold-light);background:rgba(184,151,106,.1)}
.pa-list{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
.pa-item{display:flex;gap:12px;background:rgba(178,58,58,.05);border:1px solid var(--line);border-left:3px solid var(--action);border-radius:0 5px 5px 0;padding:11px 13px}
.pa-ref{flex:none;font-size:.5rem;letter-spacing:.12em;color:var(--w-40);padding-top:3px}
.pa-body{flex:1;min-width:0}
.pa-dom{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(184,151,106,.75);margin-bottom:3px}
.pa-note{font-size:.82rem;color:var(--w-70);line-height:1.5}
.pa-empty{font-size:.78rem;color:var(--w-40);font-style:italic;padding:12px 0 4px}

.verdict-hero{text-align:center;border:1px solid var(--line);border-radius:8px;padding:38px 24px;margin-bottom:18px;background:radial-gradient(circle at 50% 0%,rgba(184,151,106,.08),transparent 70%),rgba(255,255,255,.012)}
.verdict-hero .q{font-size:.54rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(184,151,106,.78);margin-bottom:18px}
.verdict-hero .word{font-family:var(--serif);font-weight:300;font-size:2.4rem;color:var(--gold-light);line-height:1.05}
.verdict-hero .word.amber{color:#E2B271}
.verdict-hero .word.action{color:#E98A8A}
.vmeta{border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:18px}
.vmeta .vr{display:flex;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line-soft);font-size:.78rem}
.vmeta .vr:last-child{border-bottom:none}
.vmeta .vr .k{color:var(--w-40);letter-spacing:.02em}
.vmeta .vr .v{font-family:var(--serif);color:#fff;font-size:.98rem}
.summary{border:1px solid var(--line-soft);border-radius:6px;padding:4px 18px;margin-bottom:18px}
.summary details{border-bottom:1px solid var(--line-soft)}
.summary details:last-child{border-bottom:none}
.summary summary{list-style:none;cursor:pointer;padding:15px 0;display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--w-80)}
.summary summary::-webkit-details-marker{display:none}
.summary .body{padding:0 0 16px;font-size:.76rem;color:var(--w-60);line-height:1.6}
.summary .body .li{padding:5px 0;border-top:1px solid rgba(255,255,255,.04)}

.bar{flex:none;display:flex;gap:11px;padding:14px 22px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line-soft);background:var(--dark);z-index:25}
@media(min-width:740px){.bar{padding-left:40px;padding-right:40px}}
.btn{flex:1;text-align:center;border-radius:4px;padding:15px;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;font-weight:400;border:1px solid;transition:.2s}
.btn.ghost{background:transparent;border-color:var(--line);color:var(--w-60)}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#14130F;font-weight:500}
.btn.gold:hover{background:var(--gold-light);border-color:var(--gold-light)}
.btn.grow2{flex:2}
.btn:disabled{opacity:.4;cursor:not-allowed}

#toast{position:fixed;left:50%;bottom:150px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;background:rgba(20,19,15,.97);border:1px solid var(--line);color:var(--cream);font-size:.72rem;letter-spacing:.04em;padding:12px 20px;border-radius:6px;z-index:60;transition:.3s;max-width:300px;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.draft-tag{position:fixed;top:8px;left:50%;transform:translateX(-50%);font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(134,185,143,.7);opacity:0;transition:opacity .4s;z-index:40}
.draft-tag.show{opacity:1}

/* export / import controls (consistent with Comprehensive app) */
.data-bar{display:flex;gap:10px;justify-content:center;margin:26px 0 4px;padding-top:22px;border-top:1px solid var(--line-soft)}
.io-btn{display:inline-flex;align-items:center;gap:7px;font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;padding:10px 16px;border-radius:3px;border:1px solid var(--line);background:transparent;color:var(--w-60);transition:.2s;cursor:pointer}
.io-btn.export{color:var(--gold);border-color:rgba(184,151,106,.45)}
.io-btn.export:hover{border-color:var(--gold);background:rgba(184,151,106,.07)}
.io-btn.import:hover{border-color:rgba(255,255,255,.3);color:var(--w-80)}

/* modal */
.modal-ov{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(7,7,6,.74);backdrop-filter:blur(6px);animation:fade .25s ease}
.modal{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:30px 26px;text-align:center;box-shadow:0 40px 80px -30px rgba(0,0,0,.9)}
.modal .m-title{font-family:var(--serif);font-weight:300;font-size:1.55rem;color:#fff;line-height:1.15;margin-bottom:12px}
.modal .m-msg{font-size:.82rem;color:var(--w-60);line-height:1.6;margin-bottom:24px}
.modal .m-actions{display:flex;flex-direction:column;gap:10px}
.modal .m-actions .btn{flex:none;width:100%}
</style>
</head>

  var MAX_EDGE = 1600;
  var QUALITY = 0.72;
  function compressImage(file, maxEdge = MAX_EDGE, quality = QUALITY) {
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        try {
          let { width, height } = img;
          const scale = Math.min(1, maxEdge / Math.max(width, height));
          width = Math.round(width * scale);
          height = Math.round(height * scale);
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.imageSmoothingQuality = "high";
          ctx.drawImage(img, 0, 0, width, height);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL("image/jpeg", quality));
        } catch (e) {
          URL.revokeObjectURL(url);
          reject(e);
        }
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error("Image could not be read."));
      };
      img.src = url;
    });
  }

        if (!file) return;
        syncFormFromDom();
        app2.toast("Processing photograph\u2026");
        try {
          const data = await compressImage(file);
          if (f.photos.length < MAX_PHOTOS) f.photos.push(data);
          renderDomain(i);
        } catch (e) {
          app2.toast("Could not read that photograph.");
        }
      };
      document.getElementById("e_cancel").onclick = () => {
        app2.ui.form = null;
        renderDomain(i);
      };
      document.getElementById("e_save").onclick = () => {
        syncFormFromDom();
        const d = app2.V.domains[i];
        if (f.added) {
          d.checkpoints[f.checkpoint].label = f.title.trim() || "Additional observation";
        } else if (f.checkpoint == null && !f.title.trim()) {
          app2.toast("Please add a subject for this observation.");
          return;
        }
        if (!f.note.trim()) {
          app2.toast("Please describe the observation.");
          return;
        }
        const payload = newException({ title: f.checkpoint != null ? "" : f.title.trim(), note: f.note.trim(), recommendation: f.recommendation, priority: f.priority, photos: f.photos, checkpoint: f.checkpoint });
        if (f.editIndex != null) d.exceptions[f.editIndex] = payload;
        else d.exceptions.push(payload);
        if (f.checkpoint != null) d.checkpoints[f.checkpoint].state = "observed";
        app2.ui.form = null;
        app2.save();
        renderDomain(i);
        app2.toast("Observation saved.");
      };
    }
    function renderReview() {
      app2.setHdr("");
      const obsText = (n) => n === 0 ? "No issues recorded" : `${n} Observation${n !== 1 ? "s" : ""}`;
      const anyIncomplete = app2.V.domains.some((d) => d.checkpoints.some((c) => !c.state));
      const findings2 = allExceptions(app2.V);
      const total = findings2.length;
      const advisory = findings2.filter((e) => e.priority !== "action").length;
      const action = findings2.filter((e) => e.priority === "action").length;
      const affected = new Set(findings2.map((e) => e.domain)).size;
      const strip = `<div class="rv-strip">
      <div class="rv-stat"><span class="n">${total}</span><span class="l">Observation${total !== 1 ? "s" : ""}</span></div>
      <div class="rv-stat"><span class="n adv">${advisory}</span><span class="l">Advisory</span></div>
      <div class="rv-stat"><span class="n act">${action}</span><span class="l">Action</span></div>
      <div class="rv-stat"><span class="n">${affected}</span><span class="l">Section${affected !== 1 ? "s" : ""} affected</span></div>
    </div>`;
      const rows = app2.V.domains.map((d, i) => {
        const n = d.exceptions.length;
        const incomplete = d.checkpoints.some((c) => !c.state);
        return `<button class="rev-row" data-go="${i + 1}">
        <div class="rn"><div class="nm">${esc(d.name)}</div><div class="meta">${obsText(n)}</div></div>
        <span class="rev-status ${incomplete ? "inc" : "ok"}"><span class="d"></span>${incomplete ? "Incomplete" : "Complete"}</span>
        <span class="chev">\u203A</span>
      </button>`;
      }).join("");
      let gallery;
      if (!total) {
        gallery = `<div class="kf-empty">No issues recorded across any section.</div>`;
      } else {
        gallery = `<div class="kf-grid">${findings2.map((e) => {
          const step = parseInt(String(e.ref).split(".")[0], 10);
          const thumb = e.photos && e.photos[0] ? `<span class="kf-thumb" style="background-image:url('${e.photos[0]}')"></span>` : `<span class="kf-thumb none">\u2690</span>`;
          const summary = e.note || e.checkpointLabel || e.title || "Observation";
          const act = e.priority === "action";
          return `<button class="kf-card" data-go="${step}">
          ${thumb}
          <div class="kf-body">
            <div class="kf-top"><span class="kf-dom">${esc(e.domain)}</span><span class="kf-ref">REF ${esc(e.ref)}</span></div>
            <div class="kf-sum">${esc(summary)}</div>
            <span class="kf-sev ${act ? "act" : "adv"}">${act ? "Action" : "Advisory"}</span>
          </div>
          <span class="kf-edit">Edit \u203A</span>
        </button>`;
        }).join("")}</div>`;
      }
      app2.mountScreen(`
      <div class="eyebrow">Before the assessment</div>
      <div class="s-title">Review</div>
      <div class="s-sub">The Oversight Director's control checkpoint. Confirm every section and review all recorded issues before the assessment.</div>
      ${strip}
      <div class="rule"></div>
      <div class="sec-label">Section Completion</div>
      ${rows}
      <div class="sec-label" style="margin-top:26px">Key Findings</div>
      ${gallery}
      ${anyIncomplete ? `<div class="rev-warn">Complete all assessment sections before proceeding.</div>` : ""}
    `);
      app2.$$("[data-go]").forEach((b) => b.onclick = () => {
        app2.ui.form = null;
        app2.go(parseInt(b.dataset.go, 10));
      });
      app2.mountBar(`
      <button class="btn ghost" id="back">Back</button>
      <button class="btn gold grow2" id="setv"${anyIncomplete ? " disabled" : ""}>Continue to Oversight Director Assessment</button>`);
      document.getElementById("back").onclick = () => app2.go(6);
      document.getElementById("setv").onclick = () => {
        if (anyIncomplete) return;
        const c = validateCompletion(app2.V.meta);
        if (!c.ok) {
          app2.ui.invalidTimes = c.missing;
          app2.ui.returnTo = 7;
          app2.toast(c.msg);
          app2.go(0);
          return;
        }
        app2.go(8);
      };
    }
    function renderVerdict() {
      app2.setHdr("");
      if (!app2.V.review) app2.V.review = blankReview();
      const rv = app2.V.review;
      const actions = allExceptions(app2.V).filter((e) => e.priority === "action");
      const actionList = actions.length ? `<div class="pa-list">${actions.map((e) => `
          <div class="pa-item">
            <span class="pa-ref">REF ${esc(e.ref)}</span>
            <div class="pa-body">
              <div class="pa-dom">${esc(e.domain)}${e.checkpointLabel ? ` \xB7 ${esc(e.checkpointLabel)}` : ""}</div>
              <div class="pa-note">${esc(e.note || "")}</div>

      const condBtns = CONDITIONS.map(

      ).join("");
      app2.mountScreen(`
      <div class="eyebrow">Professional judgment</div>
      <div class="s-title">Oversight Director <em>Assessment</em></div>
      <div class="s-sub">${esc(app2.V.meta.residence || "This residence")} \xB7 Visit No. ${esc(app2.V.meta.visitNo || "\u2014")}</div>
      <div class="rule"></div>

      <div class="rda-field">
        <label class="rda-label">Overall Residence Condition <span class="req">Required</span></label>
        <div class="rda-help">Select the overall professional assessment of the residence based on today's inspection.</div>
        <div class="cond-grid">${condBtns}</div>
      </div>

      <div class="rda-field">
        <label class="rda-label" for="rv_exec">Executive Summary</label>
        <textarea id="rv_exec" class="rda-area" placeholder="A concise overview of the visit for the owner.">${esc(rv.executiveSummary)}</textarea>
      </div>

      <div class="rda-field">
        <label class="rda-label" for="rv_gen">General Observations</label>
        <textarea id="rv_gen" class="rda-area" placeholder="Any general notes from the visit.">${esc(rv.generalObservations)}</textarea>
      </div>

      <div class="rda-field">
        <label class="rda-label">Priority Actions</label>
        <div class="rda-help">Automatically collected from observations marked as requiring action.</div>
        ${actionList}
        <textarea id="rv_pa" class="rda-area" placeholder="Add any further commentary on priority actions (optional).">${esc(rv.priorityActionsNote)}</textarea>
      </div>

      <div class="rda-field">
        <label class="rda-label" for="rv_dir">Oversight Director Comments</label>
        <textarea id="rv_dir" class="rda-area" placeholder="Closing remarks from the Oversight Director.">${esc(rv.directorComments)}</textarea>
      </div>
    `);
      app2.$$("[data-cond]").forEach((b) => b.onclick = () => {
        rv.overallCondition = b.dataset.cond;
        app2.save();
        app2.$$("[data-cond]").forEach((x) => x.classList.toggle("sel", x.dataset.cond === rv.overallCondition));
      });
      const bindArea = (id, key) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.oninput = () => {
          rv[key] = el.value;
        };
        el.onchange = () => app2.save();
      };
      bindArea("rv_exec", "executiveSummary");
      bindArea("rv_gen", "generalObservations");
      bindArea("rv_pa", "priorityActionsNote");
      bindArea("rv_dir", "directorComments");
      app2.mountBar(`
      <button class="btn ghost" id="back">Back</button>
      <button class="btn ghost grow2" id="genHtml">Generate HTML</button>
      <button class="btn gold grow2" id="genPdf">Generate PDF</button>`);
      document.getElementById("back").onclick = () => app2.go(7);
      const requireCondition = () => {
        if (!rv.overallCondition) {
          app2.toast("Please select the Overall Residence Condition.");
          const el = document.querySelector(".cond-grid");
          if (el) el.classList.add("invalid");
          return false;
        }
        return true;
      };
      document.getElementById("genHtml").onclick = () => {
        if (requireCondition()) app2.generateBriefing();
      };
      document.getElementById("genPdf").onclick = () => {
        if (requireCondition()) app2.generatePdf();
      };
    }
    return { renderSetup, renderDomain, renderReview, renderVerdict };
  }

  var CONFIRMATIONS = {

  var MEMBERSHIP_PROVISIONS = [
    ["Weekly Residence Oversight Reviews", "A considered review of your residence, every week"],
    ["Preventative Property Oversight", "Issues identified early, before they become problems"],
    ["Contractor Coordination", "Trusted vendors sourced, vetted and managed on your behalf"],
    ["Priority Issue Management", "Anything of note handled discreetly and promptly"],
    ["Secure Digital Residence Records", "A permanent, confidential history of your home"],
    ["Dedicated Oversight Director", "One trusted point of contact who knows your home"],
    ["24/7 Support", "Luxhav reachable at any hour, wherever you are"]
  ];
  function buildReportModel(visit) {
    const m = visit.meta;
    const vd = verdict(visit);
    const exceptions = allExceptions(visit).map((e) => ({
      ...e,
      recommendation: clientRecommendation(e.recommendation)
    }));
    const climate = climateString(visit);
    const dur = durationMin(visit);
    const nextReview = nextReviewDate(visit);
    const assurance = ASSURANCE[vd.key];
    const confirmations2 = visit.domains.map((d) => {
      const c = CONFIRMATIONS[d.id];
      const noted = domainStatus(d) !== "confirmed";
      return c ? noted ? c.noted : c.clear : `${d.name} reviewed.`;
    });
    const residenceName = (m.residence || "").trim();
    const review = visit.review || {};
    const overallCondition = review.overallCondition || "";
    const condTone = { "Excellent": "assured", "Good": "assured", "Requires Attention": "amber", "Urgent Attention": "action" }[overallCondition] || "assured";
    const p = m.profile || {};
    const propertyDetails = [
      ["Property Type", p.propertyType],
      ["Occupancy", p.occupancy],
      ["Community", p.community],
      ["Bedrooms", p.bedrooms],
      ["Bathrooms", p.bathrooms],
      ["Internal Area", p.internalArea ? `${p.internalArea} sq ft` : ""],
      ["Plot Size", p.plotSize ? `${p.plotSize} sq ft` : ""],
      ["Swimming Pool", p.pool],
      ["Garden", p.garden],
      ["Maid\u2019s Room", p.maidsRoom],
      ["Driver\u2019s Room", p.driversRoom],
      ["Staff On Site", p.staffOnSite],
      ["Vehicle Spaces", p.vehicleSpaces],
      ["Vehicles Kept", p.vehiclesKept]
    ].filter(([, v]) => v !== "" && v != null);
    const findingsByDomain = visit.domains.map((d) => ({ name: d.name, items: exceptions.filter((e) => e.domain === d.name) })).filter((g) => g.items.length > 0);
    const priorityActions2 = exceptions.filter((e) => e.priority === "action");
    return {
      meta: m,
      verdict: vd,
      residenceName,
      reference: m.reference,
      dateLong: fmtDate(m.date),
      assurance,
      confirmations: confirmations2,
      exceptions,
      // [{ref, title, note, recommendation, priority, domain, photos:[]}]
      hasExceptions: exceptions.length > 0,
      findingsByDomain,
      priorityActions: priorityActions2,
      review,
      overallCondition,
      condTone,
      propertyDetails,
      climate,
      // "22°C · 55% RH" or null
      durationLabel: dur ? `${dur} minutes` : "\u2014",
      snapshot: [
        ["Residence", m.residence],
        ["Membership", `${m.membership}`],
        ["Visit", `No. ${m.visitNo}`],
        ["Date", fmtDate(m.date)],
        ["Duration on site", dur ? `${dur} minutes` : "\u2014"],
        ["Climate", climate || "Recorded on site"],
        ["Next scheduled review", fmtDate(nextReview)]
      ],
      membershipProvisions: MEMBERSHIP_PROVISIONS,
      nextReview: { date: fmtDate(nextReview), weekday: weekday(nextReview) },
      nextComprehensive: fmtDate(nextComprehensiveDate(visit)),
      signoff: {
        name: m.representative,
        role: m.role,
        endorsement: "Office of the Founder \xB7 Simon Hanlon"
      },
      audit: {
        start: m.startTime || "",
        finish: m.finishTime || "",
        duration: dur ? `${dur} minutes` : "",
        reference: m.reference
      },
      cadenceLabel: m.cadence + " Residence Oversight Review"
    };
  }

.cover .brand svg,.cover .brand span{display:none}
.cv-mid{margin:auto 0;display:flex;flex-direction:column;align-items:center;width:100%}
.cv-ey{font-size:.56rem;letter-spacing:.46em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:32px}
.cv-mem{font-size:.82rem;letter-spacing:.36em;text-transform:uppercase;color:#F3ECDE;font-weight:400}
.cv-sub{font-size:.55rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:11px}
.cv-res{font-family:var(--serif);font-weight:300;font-size:clamp(2.6rem,9vw,4.1rem);line-height:1.03;
  color:#fff;margin:32px 0 0;padding:0 6px;letter-spacing:.012em}
.cv-rule{width:56px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:32px auto 28px}
.cv-prep{font-size:.82rem;letter-spacing:.05em;color:rgba(255,255,255,.6);line-height:2.05}
.cv-conf{margin-top:52px;padding-top:26px;position:relative;
  font-size:.55rem;letter-spacing:.34em;text-transform:uppercase;color:rgba(255,255,255,.42);line-height:2.5}
.cv-conf::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:34px;height:1px;background:rgba(184,151,106,.45)}

/* \u2500\u2500 I \xB7 OVERSIGHT DIRECTOR ASSESSMENT \u2500\u2500 */
.cond-panel{background:var(--card);border:1px solid var(--line);border-radius:2px;padding:40px 28px;text-align:center;margin-bottom:46px;position:relative}
.cond-panel::before,.cond-panel::after{content:'';position:absolute;left:26px;right:26px;height:1px;background:var(--line-soft)}
.cond-panel::before{top:15px}.cond-panel::after{bottom:15px}
.cond-panel .l{font-size:.55rem;letter-spacing:.32em;text-transform:uppercase;color:var(--gold-soft)}
.cond-panel .v{font-family:var(--serif);font-weight:300;font-size:clamp(2.5rem,7.5vw,3.3rem);line-height:1.08;color:var(--tone,var(--head));margin-top:14px}
.block{margin-bottom:40px}
.block:last-child{margin-bottom:0}
.block .bh{font-size:.56rem;letter-spacing:.32em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:16px;display:flex;align-items:center;gap:14px}
.block .bh::after{content:'';flex:1;height:1px;background:var(--line-soft)}
.block p{font-size:1.06rem;line-height:1.9;color:var(--text)}
.block p + p{margin-top:15px}
.as-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:46px;
  background:var(--line);border:1px solid var(--line)}
.as-meta > div{text-align:center;padding:22px 14px;background:var(--paper)}
.as-meta .l{font-size:.5rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:10px}
.as-meta .v{font-family:var(--serif);font-size:1.16rem;color:var(--head);line-height:1.3}

/* \u2500\u2500 II \xB7 RESIDENCE DETAILS \u2500\u2500 */
.facts{display:grid;grid-template-columns:1fr;gap:0 64px}
@media(min-width:560px){.facts{grid-template-columns:1fr 1fr}}
.fact{display:flex;justify-content:space-between;gap:20px;align-items:baseline;padding:17px 2px;border-bottom:1px solid var(--line-soft)}
.fact .k{flex:none;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.fact .v{flex:1;font-family:var(--serif);font-size:1.2rem;color:var(--head);text-align:right;line-height:1.4;word-break:break-word}

/* \u2500\u2500 III \xB7 ASSESSMENT RESULTS \u2500\u2500 */
.confirm-list{border-top:1px solid var(--line-soft)}
.confirm{display:flex;gap:22px;align-items:center;padding:22px 2px;border-bottom:1px solid var(--line-soft)}
.confirm .ck{flex:none;width:28px;height:28px;border:1px solid rgba(184,151,106,.45);border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;color:var(--gold);font-size:.72rem;background:rgba(184,151,106,.08)}
.confirm .ct{font-family:var(--serif);font-weight:300;font-size:1.28rem;line-height:1.5;color:var(--head)}

/* \u2500\u2500 IV \xB7 FINDINGS \u2500\u2500 */
.fgroup{margin-bottom:50px}
.fgroup:last-child{margin-bottom:0}
.fdom{font-family:var(--serif);font-weight:300;font-size:1.7rem;color:var(--head);letter-spacing:.012em;
  margin-bottom:24px;padding-bottom:15px;border-bottom:1px solid var(--line)}
.finding{background:var(--card);border:1px solid var(--line);border-radius:2px;padding:30px 30px 32px;margin-bottom:18px}
.finding:last-child{margin-bottom:0}
.f-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--line-soft)}
.f-tag{font-size:.5rem;letter-spacing:.26em;text-transform:uppercase;padding:7px 16px;border-radius:2px;color:#fff;background:var(--amber);font-weight:400}
.finding.is-action .f-tag{background:var(--action)}
.f-ref{font-size:.55rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-soft)}
.f-h{font-family:var(--serif);font-weight:400;font-size:1.42rem;line-height:1.34;color:var(--head);margin-bottom:15px}
.f-note{font-size:1.05rem;line-height:1.82;color:var(--text)}
.f-rec{margin-top:22px;padding:20px 22px;background:rgba(184,151,106,.06);border:1px solid var(--line);border-left:2px solid var(--gold);border-radius:2px}
.f-rec .rl{font-size:.5rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:9px}
.f-rec p{font-family:var(--serif);font-style:italic;font-weight:400;font-size:1.12rem;line-height:1.62;color:var(--gold-pale)}
.f-photos{display:grid;gap:11px;margin-top:22px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.f-photos:has(img:only-child){grid-template-columns:minmax(0,60%)}
.f-photos:has(img:nth-child(2):last-child){grid-template-columns:repeat(2,1fr)}
.f-photos:has(img:nth-child(3)){grid-template-columns:repeat(3,1fr)}
.f-photos img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:2px;border:1px solid var(--line)}
@media(max-width:520px){.f-photos,.f-photos:has(img:only-child),.f-photos:has(img:nth-child(2):last-child),.f-photos:has(img:nth-child(3)){grid-template-columns:1fr}}
.f-clean{text-align:center;padding:34px 0}
.f-clean .ck{font-size:2.2rem;color:var(--gold);margin-bottom:20px}
.f-clean h3{font-family:var(--serif);font-weight:300;font-size:2.1rem;color:var(--head);line-height:1.2;margin-bottom:16px}
.f-clean p{max-width:480px;margin:0 auto;color:var(--muted);font-size:1.02rem;line-height:1.8}
.f-close-line{margin-top:42px;padding-top:32px;border-top:1px solid var(--line-soft);text-align:center;font-family:var(--serif);font-style:italic;font-size:1.15rem;color:var(--muted)}

/* \u2500\u2500 V \xB7 PRIORITY ACTIONS \u2500\u2500 */
.sec-actions .title{margin-bottom:32px}
.pa-list{display:flex;flex-direction:column;gap:16px}
.pa-item{display:flex;gap:24px;background:var(--card);border:1px solid var(--line);border-left:2px solid var(--gold);border-radius:2px;padding:28px 30px}
.pa-item .pa-ref{flex:none;min-width:58px;font-family:var(--serif);font-style:italic;font-size:1.2rem;color:var(--gold-soft);line-height:1.2;padding-top:2px}
.pa-body{flex:1;min-width:0}
.pa-dom{font-size:.52rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:12px}
.pa-txt{font-family:var(--serif);font-weight:300;font-size:1.24rem;line-height:1.55;color:var(--head)}
.pa-rec{margin-top:16px;padding-top:16px;border-top:1px solid var(--line-soft);font-size:.98rem;line-height:1.65;color:var(--text)}
.block-note{margin-top:34px;padding:28px 30px;background:rgba(184,151,106,.06);border:1px solid var(--line);border-left:2px solid var(--gold);border-radius:2px}
.block-note .bh{color:var(--gold-soft)}
.block-note .bh::after{display:none}
.block-note p{font-family:var(--serif);font-style:italic;font-size:1.14rem;line-height:1.72;color:var(--gold-pale)}

/* \u2500\u2500 VI \xB7 DIRECTOR'S NOTES \u2500\u2500 */
.sec-notes .block{background:var(--card);border:1px solid var(--line);border-radius:2px;padding:28px 30px;margin-bottom:18px}
.sec-notes .block:last-child{margin-bottom:0}

/* \u2500\u2500 CLOSING / MEMBERSHIP / SIGN-OFF \u2500\u2500 */
.sec-close{background:var(--paper);color:var(--text);padding-top:96px;padding-bottom:88px;position:relative;
  background-image:radial-gradient(130% 54% at 50% 0%,rgba(184,151,106,.1),transparent 60%)}
.sec-close::before{content:'';position:absolute;top:0;left:34px;right:34px;height:1px;background:var(--line)}
@media(min-width:700px){.sec-close::before{left:76px;right:76px}}
.sec-close .sec-head .sec-n{color:var(--gold)}
.sec-close .sec-head .sec-t{color:var(--gold-soft)}
.mem-intro{font-family:var(--serif);font-weight:300;font-size:1.42rem;font-style:italic;line-height:1.78;color:var(--gold-pale);margin:12px 0 40px;max-width:620px}
.prov{display:flex;gap:16px;padding:17px 0;border-top:1px solid var(--line-soft)}
.prov:first-of-type{border-top:none}
.prov .pd{font-size:1.02rem;color:var(--head);line-height:1.5}
.prov .pd small{display:block;color:var(--muted);font-size:.82rem;margin-top:5px;letter-spacing:.02em}
.prov .pa-dot{color:var(--gold);font-size:.85rem;padding-top:5px}
.sign{margin-top:62px;text-align:center;padding-top:52px;border-top:1px solid var(--line)}
.sign-ey{font-size:.53rem;letter-spacing:.34em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:28px}
.sign .nm{font-family:var(--serif);font-style:italic;font-weight:400;font-size:2.6rem;color:#fff;line-height:1}
.sign .sl{width:170px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:24px auto}
.sign .rl{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-soft)}
.sign .en{font-family:var(--serif);font-style:italic;font-size:.9rem;color:var(--muted);margin-top:16px;letter-spacing:.04em}
.sign .decl{max-width:560px;margin:42px auto 0;font-size:.86rem;line-height:1.95;color:var(--text)}
.sign .decl .dl{display:block;font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:14px}
.audit{display:flex;flex-wrap:wrap;justify-content:center;gap:14px 34px;max-width:580px;margin:38px auto 0;padding-top:28px;border-top:1px solid var(--line-soft);font-size:.68rem;letter-spacing:.06em;color:var(--text)}
.audit b{color:var(--gold-soft);font-weight:400;letter-spacing:.16em;text-transform:uppercase;font-size:.52rem;margin-right:8px}
.foot{margin-top:58px;padding-top:28px;border-top:1px solid var(--line-soft);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:.52rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}

/* mobile fine-tuning */
@media(max-width:560px){
  .sec-head::after{display:none}
  .as-meta{grid-template-columns:1fr;gap:1px}
  .fact .v{font-size:1.12rem}
  .pa-item{flex-direction:column;gap:14px;padding:24px 24px}
  .pa-item .pa-ref{padding-top:0}
  .sign .nm{font-size:2.2rem}
}

@media print{.cover{min-height:auto}}
`;
  var PDF_CSS = TOKENS + `
/* Oversight PDF report \u2014 full A4 sibling of the accepted V6-aligned dark HTML
   master. Neutral tokens are re-declared here so this print document inherits the
   same dark editorial palette; REPORT_CSS (a separate document) is untouched.
   Full-bleed pages (margin:0), matching the V6 detailed-inspection PDF treatment. */
:root{
  --paper:#0D0D0B; --ink:#0D0D0B;
  --card:rgba(255,255,255,.03); --card-2:rgba(184,151,106,.06);
  --line:rgba(184,151,106,.22); --line-soft:rgba(255,255,255,.1);
  --text:rgba(255,255,255,.68); --head:#FAF8F4; --muted:#9A9184;
  --gold:#B8976A; --gold-soft:#D4B48A; --gold-deep:#C6A56E; --gold-pale:#F5EDD9;
}
@page{size:A4;margin:0}
@page cover{margin:0}
html{-webkit-print-color-adjust:exact;print-color-adjust:exact}
body{background:#0D0D0B;color:var(--text);font-family:var(--sans);font-weight:300;font-size:10.5pt;line-height:1.68}
.wrap{max-width:none;background:#0D0D0B}

/* section rhythm \u2014 full-bleed, generous gutters, major openers on fresh pages */
.sec{padding:15mm 20mm;background:#0D0D0B}
.sec-exec,.sec-findings,.sec-actions,.sec-close{break-before:page;padding-top:22mm}
.sec-details,.sec-confirm,.sec-notes{break-inside:avoid}
.sec-head{display:flex;align-items:center;gap:10pt;margin-bottom:8pt}
.sec-head .sec-n{font-family:var(--serif);font-style:italic;font-size:15pt;color:var(--gold);line-height:1}
.sec-head .sec-t{font-size:7.5pt;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.sec-head::after{content:'';flex:1;height:.5pt;background:var(--line)}
h2.title{font-family:var(--serif);font-weight:300;font-size:24pt;line-height:1.06;color:var(--head);margin:0 0 20pt}
h2.title em{font-style:italic;color:var(--gold-soft)}

/* \u2500\u2500 COVER (full-bleed dark, official Luxhav lockup) \u2500\u2500 */
.cover{page:cover;break-after:page;background:#0D0D0B;color:var(--head);text-align:center;height:297mm;
  padding:30mm 26mm;display:flex;flex-direction:column;position:relative;
  background-image:radial-gradient(140% 60% at 50% -2%,rgba(184,151,106,.15),transparent 56%)}
